name: Build and Email APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория (всё остается нетронутым)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. ИСПРАВЛЕНО: Запускаем проверку кода ИСКЛЮЧИТЕЛЬНО для дебаг-версии.
      # Теперь Gradle вообще проигнорирует задачу kspReleaseKotlin!
      - name: Run Quality Checks for Debug Only
        run: ./gradlew compileDebugSources

      # 5. Собираем только отладочный APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ИСПРАВЛЕНО: Упаковываем APK в ZIP и ставим пароль "1234", чтобы обойти защиту Google
      - name: Zip APK with Password
        run: zip -j -P 1234 app-debug.zip app/build/outputs/apk/debug/app-debug.apk

      # 7. Отправляем письмо с ЗАШИФРОВАННЫМ ZIP-архивом
      - name: Send email with APK
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ://gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Сборка приложения (Запароленный ZIP): ${{ github.event.head_commit.message }}"
          to: apereverzev47@gmail.com
          from: "GitHub Actions Robot <${{ secrets.MAIL_USERNAME }}>"
          body: "Привет! Сборка успешна. Скачай архив app-debug.zip, распакуй его с паролем 1234 и установи APK в папку Knox."
          
          # Отправляем именно защищенный ZIP
          attachments: app-debug.zip
