name: Build and Send APK to Telegram

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Проверка качества кода
      - name: Run Quality Checks for Debug Only
        run: ./gradlew compileDebugSources

      # 5. Собираем только отладочный APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6. Отправляем готовый файл прямо вам в Telegram-чат через вашего созданного бота
      - name: Send APK to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: 706399730
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "Сборка готова!"
          document: app/build/outputs/apk/debug/app-debug.apk
