name: Build and Send APK to Telegram

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Проверка качества кода
      - name: Run Quality Checks for Debug Only
        run: ./gradlew compileDebugSources

      # 5. ДОБАВЛЕНО: Меняем имя пакета на .test, чтобы обойти конфликт подписей в Knox
      - name: Change Application ID for Test Build
        run: |
          sed -i 's/applicationId "com.exampl3.flashlight"/applicationId "com.exampl3.flashlight.test"/g' app/build.gradle.kts || true
          sed -i 's/applicationId "com.exampl3.flashlight"/applicationId "com.exampl3.flashlight.test"/g' app/build.gradle || true

      # 6. Собираем только отладочный APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 7. Отправляем готовый файл прямо вам в Telegram-чат
      - name: Send APK to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: 706399730
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "Имя пакета изменено на .test! Эта сборка гарантированно установится в Knox без конфликтов. Тестируй бэкап!"
          document: app/build/outputs/apk/debug/app-debug.apk
