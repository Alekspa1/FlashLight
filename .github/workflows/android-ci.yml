name: Build and Email APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java (кэширование Gradle включено и работает)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. ГЛАВНЫЙ ШАГ: Запускает синтаксис-чекер, линтеры и Unit-тесты
      # Теперь сервер будет делать только это
      - name: Run Quality Checks and Unit Tests
        run: ./gradlew check

      # Все шаги ниже ПОЛНОСТЬЮ ЗАКОММЕНТИРОВАНЫ (знаком # в начале строки).
