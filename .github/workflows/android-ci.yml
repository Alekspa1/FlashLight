name: Build and Email APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java с кэшированием
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Запускаем тесты и линтеры
      - name: Run Quality Checks and Unit Tests
        run: ./gradlew check

      # 5. Собираем дебажный APK (он пропустит ошибку пустых схем Room)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6. Запаковываем APK в ZIP-архив (чтобы Gmail не заблокировал вложение)
      - name: Zip APK
        run: zip -j app-debug.zip app/build/outputs/apk/debug/app-debug.apk

      # 7. Отправляем письмо с ZIP-архивом через ваш аккаунт Gmail
      - name: Send email with APK
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com # ИСПРАВЛЕНО: чистый адрес сервера без ://
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }} # Тот самый 16-значный пароль без пробелов
          subject: "Новая сборка приложения (Debug): ${{ github.event.head_commit.message }}"
          to: apereverzev47@gmail.com
          from: "GitHub Actions Robot <${{ secrets.MAIL_USERNAME }}>"
          body: "Привет! Сборка успешна. Во вложении ZIP-архив с отладочным APK-файлом для тестирования бэкапа в папке Knox."
          attachments: app-debug.zip
