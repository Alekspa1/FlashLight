name: Build and Email APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Собираем отладочный APK (Режим Debug идеально подходит для тестов на телефоне)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Отправляем готовый APK на вашу почту
      - name: Send email with APK
        uses: dawidd6/action-send-mail@v4
        with:
          # Настройки вашего почтового сервера (в примере Яндекс, можно использовать Gmail/Mail.ru)
          server_address: smtp.gmail.com
          server_port: 465
          # Секреты, которые мы сохраним в настройках GitHub (инструкция ниже)
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          
          # Кому и от кого отправлять письмо
          subject: "Новая сборка приложения: ${{ github.event.head_commit.message }}"
          to: apereverzev47@gmail.com # Напишите сюда вашу личную почту, куда хотите получать APK
          from: "GitHub Actions Robot <${{ secrets.MAIL_USERNAME }}>"
          
          # Текст письма
          body: "Привет! Ты внес правки в код. Во вложении находится свежий APK-файл для тестирования будильника."
          
          # Путь к собранному APK-файлу (у Android он всегда стандартный)
          attachments: app/build/outputs/apk/debug/app-debug.apk
