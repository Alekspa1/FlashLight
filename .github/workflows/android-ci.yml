name: Build and Send Release APK to Telegram

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Проверка качества кода (опционально, для релизных исходников)
      - name: Run Quality Checks for Release
        run: ./gradlew compileReleaseSources

      # 5. Собираем релизный APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 6. Подписываем релизный APK вашим ключом
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_PASSWORD }}
          keyPassword: ${{ secrets.KEY_STORE_PASSWORD }}
        # Версия указывается в блоке env большими буквами!
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # 7. Отправляем подписанный релизный файл в Telegram
      - name: Send APK to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: 706399730
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "Релизная сборка готова и подписана!"
          document: ${{ steps.sign_app.outputs.signedReleaseFile }}
