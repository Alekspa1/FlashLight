name: Build and Email APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java с кэшированием
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Запускаем тесты и линтеры
      - name: Run Quality Checks and Unit Tests
        run: ./gradlew check

       # 5. Собираем дебажный APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ИСПРАВЛЕНО: Просто переименовываем APK в TXT (без сжатия в ZIP)
      - name: Rename APK to TXT
        run: cp app/build/outputs/apk/debug/app-debug.apk app-debug.txt

      # 6. Отправляем письмо с TXT-файлом
      - name: Send email with APK
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ://gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Сборка приложения (TXT): ${{ github.event.head_commit.message }}"
          to: apereverzev47@gmail.com
          from: "GitHub Actions Robot <${{ secrets.MAIL_USERNAME }}>"
          body: "Привет! Сборка успешна. Скачай файл app-debug.txt и переименуй его обратно в app-debug.apk перед установкой."
          
          # Отправляем именно переименованный TXT
          attachments: app-debug.txt
