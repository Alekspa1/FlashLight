name: Build and Email APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Собираем отладочный APK (Режим Debug идеально подходит для тестов на телефоне)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

        # ДОБАВИТЬ ЭТУ СТРОКУ: Запаковываем APK в ZIP-архив
      - name: Zip APK
        run: zip -j app-debug.zip app/build/outputs/apk/debug/app-debug.apk

      # 5. Отправляем письмо с ZIP-архивом
      - name: Send email with APK
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ://gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Новая сборка приложения: ${{ github.event.head_commit.message }}"
          to: apereverzev47@gmail.com
          from: "GitHub Actions Robot <${{ secrets.MAIL_USERNAME }}>"
          body: "Привет! Сборка успешна. Во вложении ZIP-архив с APK-файлом."
          
          # ИЗМЕНИТЬ ЭТУ СТРОКУ: Отправляем именно созданный ZIP
          attachments: app-debug.zip 
