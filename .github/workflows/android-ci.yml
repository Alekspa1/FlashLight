name: Code Quality Check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java (кэширование Gradle включено и работает)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Даем права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. ГЛАВНЫЙ ШАГ: Проверяет синтаксис Kotlin, типы данных, корутины и граф Hilt
      # Робот будет выполнять только эту задачу
      - name: Run Quality Checks for Debug Only
        run: ./gradlew compileDebugSources
